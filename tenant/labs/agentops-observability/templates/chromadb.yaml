---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chromadb
  namespace: {{ .Values.namespace }}
  labels:
    app: chromadb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chromadb
  template:
    metadata:
      labels:
        app: chromadb
    spec:
      containers:
        - name: chromadb
          image: {{ .Values.images.chromadb }}
          ports:
            - containerPort: 8000
          env:
            - name: IS_PERSISTENT
              value: "TRUE"
            - name: PERSIST_DIRECTORY
              value: /chroma/chroma
            - name: ANONYMIZED_TELEMETRY
              value: "FALSE"
          volumeMounts:
            - name: chroma-data
              mountPath: /chroma/chroma
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /api/v1/heartbeat
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: chroma-data
          persistentVolumeClaim:
            claimName: chromadb-data
---
apiVersion: v1
kind: Service
metadata:
  name: chromadb
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: chromadb
  ports:
    - port: 8000
      targetPort: 8000
