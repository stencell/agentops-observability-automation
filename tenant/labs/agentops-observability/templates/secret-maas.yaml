{{- if .Values.litemaas.enabled }}
---
# MaaS credentials — created from litemaas helm values provisioned at order time.
# Never hardcode values here. Values come from Field Source CI at deploy time.
apiVersion: v1
kind: Secret
metadata:
  name: maas-credentials
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  MAAS_API_BASE: {{ .Values.litemaas.apiUrl | quote }}
  MAAS_API_KEY: {{ .Values.litemaas.apiKey | quote }}
  MAAS_MODEL_ID: {{ .Values.litemaas.model | quote }}
{{- end }}
