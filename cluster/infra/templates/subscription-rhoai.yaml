{{- if .Values.operators.rhoai.enabled }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.operators.rhoai.namespace }}
  labels:
    openshift.io/cluster-monitoring: "true"
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: rhods-operator
  namespace: {{ .Values.operators.rhoai.namespace }}
spec:
  upgradeStrategy: Default
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: rhods-operator
  namespace: {{ .Values.operators.rhoai.namespace }}
spec:
  channel: {{ .Values.operators.rhoai.channel }}
  installPlanApproval: Automatic
  name: rhods-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
{{- end }}
