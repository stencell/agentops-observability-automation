{{- if .Values.operators.lokiOperator.enabled }}
---
# Loki Operator — Red Hat operator (redhat-operators catalog)
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: loki-operator
  namespace: openshift-operators
spec:
  channel: {{ .Values.operators.lokiOperator.channel }}
  installPlanApproval: Automatic
  name: loki-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
{{- end }}
